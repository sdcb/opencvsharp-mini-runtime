name: push-nuget
on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write
  
jobs:
  push:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
        - { os: win,          arch: x64,   }
        - { os: win,          arch: x86,   }
        - { os: win,          arch: arm64, }
        - { os: osx,          arch: x64,   }
        - { os: osx,          arch: arm64, }
        - { os: linux,        arch: x64,   }
        - { os: linux,        arch: arm64, }
        - { os: linux-musl,   arch: x64,   }
        - { os: linux-musl,   arch: arm64, }
        - { os: android,      arch: arm64, }
        - { os: android,      arch: x64,   }
  
    steps:
    - name: Download Artifacts
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "Fetching latest successful run of branch ${{ github.ref_name }}"
        RUN_ID=$(gh run list -R ${{ github.repository }} \
                  --workflow=make-nuget.yml \
                  --branch=${{ github.ref_name }} \
                  --status=success --limit=1 \
                  --json databaseId | jq -r '.[0].databaseId')
        echo "Run id = $RUN_ID"
        
        echo "Download artifact ${{ matrix.os }}-${{ matrix.arch }}"
        gh run download -R ${{ github.repository }} $RUN_ID --name nuget-${{ matrix.os }}-${{ matrix.arch }} --dir nupkg-src

        echo "::group::Artifact tree"
        ls -lR nupkg-src
        echo "::endgroup::"

    - name: NuGet Login
      id: login
      uses: NuGet/login@v1
      with:
        user: sdflysha

    - name: Push nupkg to NuGet
      run: |
        for nupkg in nupkg-src/*.nupkg; do
          echo "Uploading $nupkg"
          dotnet nuget push "$nupkg" --source "https://www.nuget.org/api/v2/package" --skip-duplicate --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
        done
